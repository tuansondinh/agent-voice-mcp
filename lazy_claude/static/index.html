<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Voice Bridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface-hover: #1a2744;
  --text: #e8e8e8;
  --text-dim: #8b8fa3;
  --accent: #e94560;
  --accent-glow: rgba(233, 69, 96, 0.3);
  --user-bubble: #0f3460;
  --assistant-bubble: #1e2d4a;
  --success: #4ade80;
  --border: #2a2f4a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
}

.status {
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #666;
  transition: background 0.3s;
}

.status-dot.connected { background: var(--success); }
.status-dot.recording { background: var(--accent); animation: pulse 1s infinite; }
.status-dot.processing { background: #f59e0b; animation: pulse 0.5s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.message {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  background: var(--user-bubble);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.message.assistant {
  background: var(--assistant-bubble);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.message .label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.message pre {
  background: rgba(0,0,0,0.3);
  padding: 8px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 13px;
  margin: 6px 0;
}

.message code {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
}

/* Controls */
.controls {
  padding: 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
}

.mic-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.mic-btn:active, .mic-btn.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 20px var(--accent-glow);
  transform: scale(1.05);
}

.mic-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.mic-btn.active {
  animation: mic-pulse 1.5s infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
  50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(233, 69, 96, 0.15); }
}

.control-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

.stop-btn {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface-hover);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  display: none;
}

.stop-btn.visible { display: block; }

.vad-indicator {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.15s;
}

.vad-indicator.active { background: var(--success); }

.hint {
  font-size: 12px;
  color: var(--text-dim);
}

/* Loading overlay */
.loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 100;
  transition: opacity 0.3s;
}

.loading.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>Connecting to Voice Bridge...</div>
</div>

<div class="header">
  <h1>Voice Bridge</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="controls">
  <div class="control-row">
    <div class="vad-indicator" id="vadIndicator"></div>
    <span class="hint" id="hint">Tap to speak</span>
    <button class="stop-btn" id="stopBtn" onclick="stopTTS()">Stop</button>
  </div>
  <button class="mic-btn" id="micBtn" disabled>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------

let ws = null;
let audioCtxCapture = null;
let audioCtxPlayback = null;
let workletNode = null;
let micStream = null;
let isRecording = false;
let isTTSPlaying = false;

// Audio playback queue (24kHz Int16LE chunks)
let playbackQueue = [];
let isPlayingAudio = false;
const PLAYBACK_RATE = 24000;
const JITTER_BUFFER_MS = 200;

// DOM
const chat = document.getElementById('chat');
const micBtn = document.getElementById('micBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const vadIndicator = document.getElementById('vadIndicator');
const stopBtn = document.getElementById('stopBtn');
const hint = document.getElementById('hint');
const loading = document.getElementById('loading');

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------

function connect() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}/ws?token=${token}`;

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('connected', 'Connected');
  };

  ws.onmessage = (evt) => {
    if (evt.data instanceof ArrayBuffer) {
      handleAudioData(evt.data);
    } else {
      try {
        const msg = JSON.parse(evt.data);
        handleMessage(msg);
      } catch(e) {}
    }
  };

  ws.onclose = (evt) => {
    setStatus('', 'Disconnected');
    micBtn.disabled = true;
    stopRecording();
    // Reconnect after 3s
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {};
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'ready':
      loading.classList.add('hidden');
      micBtn.disabled = false;
      break;

    case 'vad_state':
      vadIndicator.classList.toggle('active', msg.speaking);
      break;

    case 'transcript':
      addMessage('user', msg.text);
      setStatus('processing', 'Processing...');
      hint.textContent = 'Claude is thinking...';
      break;

    case 'assistant_chunk':
      appendAssistantChunk(msg.text);
      break;

    case 'assistant_done':
      finalizeAssistantMessage();
      break;

    case 'tts_start':
      isTTSPlaying = true;
      stopBtn.classList.add('visible');
      playbackQueue = [];
      isPlayingAudio = false;
      break;

    case 'tts_end':
      isTTSPlaying = false;
      // Play any remaining buffered audio
      if (playbackQueue.length > 0 && !isPlayingAudio) {
        playBufferedAudio();
      }
      setTimeout(() => {
        stopBtn.classList.remove('visible');
        setStatus('connected', 'Connected');
        hint.textContent = 'Tap to speak';
      }, 500);
      break;

    case 'error':
      addSystemMessage('Error: ' + msg.message);
      setStatus('connected', 'Connected');
      hint.textContent = 'Tap to speak';
      break;
  }
}

// ---------------------------------------------------------------------------
// Audio capture (16kHz mono PCM via AudioWorklet)
// ---------------------------------------------------------------------------

async function startRecording() {
  if (isRecording) return;

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: 16000,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
      }
    });

    audioCtxCapture = new AudioContext({ sampleRate: 16000 });

    // Register AudioWorklet processor inline via Blob
    const workletCode = `
      class PCMProcessor extends AudioWorkletProcessor {
        process(inputs) {
          const input = inputs[0];
          if (input && input[0] && input[0].length > 0) {
            // Convert Float32 to Int16
            const float32 = input[0];
            const int16 = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
              const s = Math.max(-1, Math.min(1, float32[i]));
              int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            this.port.postMessage(int16.buffer, [int16.buffer]);
          }
          return true;
        }
      }
      registerProcessor('pcm-processor', PCMProcessor);
    `;
    const blob = new Blob([workletCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    await audioCtxCapture.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    const source = audioCtxCapture.createMediaStreamSource(micStream);
    workletNode = new AudioWorkletNode(audioCtxCapture, 'pcm-processor');

    workletNode.port.onmessage = (evt) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(evt.data);
      }
    };

    source.connect(workletNode);
    workletNode.connect(audioCtxCapture.destination); // needed to keep processing

    isRecording = true;
    micBtn.classList.add('active');
    setStatus('recording', 'Listening...');
    hint.textContent = 'Speak now — silence ends recording';

  } catch (err) {
    console.error('Mic error:', err);
    addSystemMessage('Microphone access denied. Please allow mic access.');
  }
}

function stopRecording() {
  if (!isRecording) return;

  isRecording = false;
  micBtn.classList.remove('active');

  if (workletNode) {
    workletNode.disconnect();
    workletNode = null;
  }
  if (audioCtxCapture) {
    audioCtxCapture.close();
    audioCtxCapture = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
}

// Toggle recording on mic button click
micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
    setStatus('connected', 'Connected');
    hint.textContent = 'Tap to speak';
  } else {
    startRecording();
  }
});

// ---------------------------------------------------------------------------
// Audio playback (24kHz Int16LE from server)
// ---------------------------------------------------------------------------

function handleAudioData(buffer) {
  playbackQueue.push(buffer);

  // Start playing after jitter buffer fills or TTS ended
  if (!isPlayingAudio) {
    const totalBytes = playbackQueue.reduce((s, b) => s + b.byteLength, 0);
    const totalMs = (totalBytes / 2) / PLAYBACK_RATE * 1000;

    if (totalMs >= JITTER_BUFFER_MS || !isTTSPlaying) {
      playBufferedAudio();
    }
  }
}

function playBufferedAudio() {
  if (playbackQueue.length === 0) {
    isPlayingAudio = false;
    return;
  }

  isPlayingAudio = true;

  if (!audioCtxPlayback || audioCtxPlayback.state === 'closed') {
    audioCtxPlayback = new AudioContext({ sampleRate: PLAYBACK_RATE });
  }

  // Merge all queued buffers
  const totalLen = playbackQueue.reduce((s, b) => s + b.byteLength, 0) / 2;
  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const buf of playbackQueue) {
    const int16 = new Int16Array(buf);
    for (let i = 0; i < int16.length; i++) {
      merged[offset++] = int16[i] / 32768;
    }
  }
  playbackQueue = [];

  const audioBuffer = audioCtxPlayback.createBuffer(1, merged.length, PLAYBACK_RATE);
  audioBuffer.getChannelData(0).set(merged);

  const source = audioCtxPlayback.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtxPlayback.destination);
  source.onended = () => {
    // Play next batch if available
    if (playbackQueue.length > 0) {
      playBufferedAudio();
    } else {
      isPlayingAudio = false;
    }
  };
  source.start();
}

function stopTTS() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'stop_tts' }));
  }
  playbackQueue = [];
  isPlayingAudio = false;
  if (audioCtxPlayback) {
    audioCtxPlayback.close();
    audioCtxPlayback = null;
  }
  isTTSPlaying = false;
  stopBtn.classList.remove('visible');
}

// ---------------------------------------------------------------------------
// Chat UI
// ---------------------------------------------------------------------------

let currentAssistantEl = null;

function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `message ${role}`;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Claude';
  el.appendChild(label);

  const content = document.createElement('div');
  content.textContent = text;
  el.appendChild(content);

  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function appendAssistantChunk(text) {
  if (!currentAssistantEl) {
    currentAssistantEl = document.createElement('div');
    currentAssistantEl.className = 'message assistant';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'Claude';
    currentAssistantEl.appendChild(label);

    const content = document.createElement('div');
    content.className = 'content';
    currentAssistantEl.appendChild(content);

    chat.appendChild(currentAssistantEl);
  }

  const content = currentAssistantEl.querySelector('.content');
  content.textContent += text;
  chat.scrollTop = chat.scrollHeight;
}

function finalizeAssistantMessage() {
  if (currentAssistantEl) {
    // Simple markdown: convert code blocks
    const content = currentAssistantEl.querySelector('.content');
    if (content) {
      content.innerHTML = simpleMarkdown(content.textContent);
    }
  }
  currentAssistantEl = null;
}

function addSystemMessage(text) {
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.style.opacity = '0.7';
  el.style.fontStyle = 'italic';
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

function simpleMarkdown(text) {
  // Escape HTML
  let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Line breaks
  html = html.replace(/\n/g, '<br>');

  return html;
}

// ---------------------------------------------------------------------------
// Status
// ---------------------------------------------------------------------------

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------

connect();
</script>
</body>
</html>
